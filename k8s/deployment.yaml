apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: monitoring-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: namespace-container
        image: nginx
        ports:
        - containerPort: 80
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace:  monitoring-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: anujaayare/order-service:v1
        ports:
        - containerPort: 5000